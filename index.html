<script id="CEN-JESUS-FOOTER-HANDLER-V9">
(function(){
  const links={
    timeline:'https://centiger.github.io/CEN-Chronology/?view=timeline',
    connect:'https://centiger.github.io/CEN-Chronology/',
    overview:'https://centiger.github.io/CEN-Bible2.0/#overview66'
  };
  function getDrawer(){
    return document.getElementById('drawer') || document.getElementById('hubDrawer');
  }
  function openDrawer(){
    const d=getDrawer();
    if(d){ d.classList.add('show'); d.setAttribute('aria-hidden','false'); return; }
    location.href='hubs/index.html';
  }
  function closeDrawer(){
    const d=getDrawer();
    if(d){ d.classList.remove('show'); d.setAttribute('aria-hidden','true'); }
  }
  document.addEventListener('click',function(e){
    const closeBtn=e.target.closest && e.target.closest('#closeBtn,.close,#hubDrawerClose,.drawerClose');
    if(closeBtn){
      e.preventDefault();
      e.stopPropagation();
      closeDrawer();
      return;
    }
    const d=getDrawer();
    if(d && e.target===d){
      e.preventDefault();
      e.stopPropagation();
      closeDrawer();
      return;
    }
    const btn=e.target.closest && e.target.closest('footer.actions .action');
    if(!btn) return;
    e.preventDefault();
    e.stopPropagation();
    const key=btn.dataset.link || (btn.textContent||'').trim();
    if(key==='hub' || key==='허브'){ openDrawer(); return; }
    const url=links[key] || links[(btn.textContent||'').trim()];
    if(url) location.href=url;
  },true);
})();
</script>

<script id="CEN-JESUS-SCROLL-LIMIT-V13">
(function(){
  const EXTRA_AFTER_IMAGE = 0;
  function bottomUiHeight(){
    const flow=document.querySelector('.jesus-flow-strip');
    const nav=document.querySelector('footer.actions');
    return (flow?flow.offsetHeight:0)+(nav?nav.offsetHeight:0);
  }
  function maxScrollY(){
    const img=document.querySelector('img.bg');
    if(!img) return Math.max(0,document.documentElement.scrollHeight-window.innerHeight);
    const rect=img.getBoundingClientRect();
    const imgBottom=window.scrollY+rect.bottom;
    return Math.max(0,imgBottom-window.innerHeight+bottomUiHeight()+EXTRA_AFTER_IMAGE);
  }
  let ticking=false;
  function clamp(){const max=maxScrollY(); if(window.scrollY>max) window.scrollTo(0,max);}
  window.addEventListener('scroll',function(){if(ticking)return;ticking=true;requestAnimationFrame(function(){clamp();ticking=false;});},{passive:true});
  window.addEventListener('load',function(){setTimeout(clamp,120)});
  window.addEventListener('resize',clamp);
})();
</script>
