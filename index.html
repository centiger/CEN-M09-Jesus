<script id="CEN-JESUS-FOOTER-HANDLER-V4">
(function(){
  const links={
    timeline:'https://centiger.github.io/cen-bible-chrololgy/?view=timeline',
    connect:'https://centiger.github.io/cen-bible-chrololgy/#hub',
    overview:'https://centiger.github.io/CEN-Bible2.0/#overview66'
  };
  function openHubDrawer(){
    const d=document.getElementById('hubDrawer')||document.getElementById('drawer');
    if(d){ d.classList.add('show'); d.setAttribute('aria-hidden','false'); return; }
    location.href='hubs/index.html';
  }
  document.addEventListener('click',function(e){
    const btn=e.target.closest && e.target.closest('footer.actions .action');
    if(!btn) return;
    e.preventDefault(); e.stopPropagation(); e.stopImmediatePropagation();
    const key=btn.dataset.link || (btn.textContent||'').trim();
    if(key==='hub' || key==='허브'){ openHubDrawer(); return; }
    const url=links[key] || links[(btn.textContent||'').trim()];
    if(url) location.href=url;
  },true);
})();
</script>


<script id="CEN-JESUS-DRAG-LIMIT-V4">
(function(){
  function clampScroll(){
    const bg = document.querySelector('img.bg, .bg img, #bg, .background img, .matrix-bg');
    if(!bg) return;
    const rect = bg.getBoundingClientRect();
    const pageTop = window.scrollY + rect.top;
    const limit = Math.max(0, pageTop + bg.offsetHeight - window.innerHeight + 8);
    if(window.scrollY > limit) window.scrollTo(0, limit);
  }
  let ticking=false;
  window.addEventListener('scroll',function(){
    if(ticking) return;
    ticking=true;
    requestAnimationFrame(function(){clampScroll(); ticking=false;});
  },{passive:true});
  window.addEventListener('load',clampScroll);
  window.addEventListener('resize',clampScroll);
})();
</script>
