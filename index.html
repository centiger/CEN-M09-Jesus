<script id="CEN-JESUS-FOOTER-HANDLER-V9">
(function(){
  const links={
    timeline:'https://centiger.github.io/cen-bible-chrololgy/?view=timeline',
    connect:'https://centiger.github.io/cen-bible-chrololgy/#hub',
    overview:'https://centiger.github.io/CEN-Bible2.0/#overview66'
  };
  function getDrawer(){
    return document.getElementById('drawer') || document.getElementById('hubDrawer');
  }
  function openDrawer(){
    const d=getDrawer();
    if(d){ d.classList.add('show'); d.setAttribute('aria-hidden','false'); return; }
    location.href='hubs/index.html';
  }
  function closeDrawer(){
    const d=getDrawer();
    if(d){ d.classList.remove('show'); d.setAttribute('aria-hidden','true'); }
  }
  document.addEventListener('click',function(e){
    const closeBtn=e.target.closest && e.target.closest('#closeBtn,.close,#hubDrawerClose,.drawerClose');
    if(closeBtn){
      e.preventDefault();
      e.stopPropagation();
      closeDrawer();
      return;
    }
    const d=getDrawer();
    if(d && e.target===d){
      e.preventDefault();
      e.stopPropagation();
      closeDrawer();
      return;
    }
    const btn=e.target.closest && e.target.closest('footer.actions .action');
    if(!btn) return;
    e.preventDefault();
    e.stopPropagation();
    const key=btn.dataset.link || (btn.textContent||'').trim();
    if(key==='hub' || key==='허브'){ openDrawer(); return; }
    const url=links[key] || links[(btn.textContent||'').trim()];
    if(url) location.href=url;
  },true);
})();
</script>
